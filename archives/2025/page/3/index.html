<script>
(function() {
  'use strict';

  // 折叠/展开功能
  function initCollapsibleSections() {
    var toggleBtns = document.querySelectorAll('.archive-toggle-btn');
    
    toggleBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        var targetId = this.getAttribute('data-target');
        var target = document.getElementById(targetId);
        var icon = this.querySelector('i');
        
        if (target.classList.contains('collapsed')) {
          target.classList.remove('collapsed');
          target.style.display = 'block';
          icon.classList.remove('fa-chevron-right');
          icon.classList.add('fa-chevron-down');
          this.classList.remove('collapsed');
        } else {
          target.classList.add('collapsed');
          target.style.display = 'none';
          icon.classList.remove('fa-chevron-down');
          icon.classList.add('fa-chevron-right');
          this.classList.add('collapsed');
        }
      });
    });
  }

  // 搜索功能
  function initSearch() {
    var searchInput = document.getElementById('archive-search');
    var searchClear = document.getElementById('archive-search-clear');
    var postItems = document.querySelectorAll('.archive-post-item');
    
    if (!searchInput) return;
    
    searchInput.addEventListener('input', function(e) {
      var query = e.target.value.toLowerCase();
      
      postItems.forEach(function(item) {
        var title = item.getAttribute('data-title').toLowerCase();
        var categories = item.getAttribute('data-categories').toLowerCase();
        
        if (title.includes(query) || categories.includes(query)) {
          item.classList.remove('hidden');
        } else {
          item.classList.add('hidden');
        }
      });
      
      if (query.trim()) {
        searchClear.style.display = 'block';
      } else {
        searchClear.style.display = 'none';
      }
    });
    
    searchClear.addEventListener('click', function() {
      searchInput.value = '';
      postItems.forEach(function(item) {
        item.classList.remove('hidden');
      });
      searchClear.style.display = 'none';
    });
  }

  // 过滤功能
  function initFilters() {
    var yearFilter = document.getElementById('archive-year-filter');
    var categoryFilter = document.getElementById('archive-category-filter');
    var postItems = document.querySelectorAll('.archive-post-item');
    var yearSections = document.querySelectorAll('.archive-year');
    
    function applyFilters() {
      var selectedYear = yearFilter.value;
      var selectedCategory = categoryFilter.value;
      
      yearSections.forEach(function(yearSection) {
        var year = yearSection.getAttribute('data-year');
        var shouldShowYear = !selectedYear || year === selectedYear;
        
        yearSection.style.display = shouldShowYear ? 'block' : 'none';
        
        if (shouldShowYear) {
          var monthSections = yearSection.querySelectorAll('.archive-month');
          monthSections.forEach(function(monthSection) {
            var postItems = monthSection.querySelectorAll('.archive-post-item');
            var hasVisiblePosts = false;
            
            postItems.forEach(function(item) {
              var categories = item.getAttribute('data-categories');
              var shouldShowItem = !selectedCategory || categories.includes(selectedCategory);
              
              item.style.display = shouldShowItem ? 'flex' : 'none';
              if (shouldShowItem) hasVisiblePosts = true;
            });
            
            monthSection.style.display = hasVisiblePosts ? 'block' : 'none';
          });
        }
      });
    }
    
    if (yearFilter) yearFilter.addEventListener('change', applyFilters);
    if (categoryFilter) categoryFilter.addEventListener('change', applyFilters);
  }

  // 初始化
  document.addEventListener('DOMContentLoaded', function() {
    initCollapsibleSections();
    initSearch();
    initFilters();
    
    // 默认折叠所有年份（除了最新的一年）
    var yearSections = document.querySelectorAll('.archive-year');
    yearSections.forEach(function(section, index) {
      if (index > 0) {
        var toggleBtn = section.querySelector('.archive-toggle-btn');
        if (toggleBtn) toggleBtn.click();
      }
    });
  });
})();
</script>

<script>
  // 复制链接功能
  function copyLink() {
    var url = window.location.href;
    var title = document.title;
    var text = title + ' - ' + url;
    
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(function() {
        showCopyToast('链接已复制到剪贴板');
      }).catch(function() {
        fallbackCopy(text);
      });
    } else {
      fallbackCopy(text);
    }
  }
  
  function fallbackCopy(text) {
    var textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.left = '-9999px';
    document.body.appendChild(textarea);
    textarea.select();
    
    try {
      document.execCommand('copy');
      showCopyToast('链接已复制到剪贴板');
    } catch (err) {
      showCopyToast('复制失败，请手动复制');
    }
    
    document.body.removeChild(textarea);
  }
  
  function showCopyToast(message) {
    var existingToast = document.querySelector('.copy-toast');
    if (existingToast) {
      existingToast.remove();
    }
    
    var toast = document.createElement('div');
    toast.className = 'copy-toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    
    setTimeout(function() {
      toast.classList.add('show');
    }, 10);
    
    setTimeout(function() {
      toast.classList.remove('show');
      setTimeout(function() {
        toast.remove();
      }, 300);
    }, 2000);
  }
  
  // 分享到微博
  function shareToWeibo() {
    var url = window.location.href;
    var title = document.title;
    var pic = '';
    
    // 尝试获取文章中的第一张图片
    var firstImg = document.querySelector('.post-body img');
    if (firstImg) {
      pic = firstImg.src;
    }
    
    var shareUrl = 'https://service.weibo.com/share/share.php?' +
      'url=' + encodeURIComponent(url) +
      '&title=' + encodeURIComponent(title) +
      '&pic=' + encodeURIComponent(pic) +
      '&searchPic=false';
    
    window.open(shareUrl, '_blank', 'width=600,height=400');
  }
  
  // 分享到微信
  function shareToWechat() {
    var url = window.location.href;
    var title = document.title;
    
    // 检测是否为移动设备
    var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    
    if (isMobile) {
      // 手机端：尝试直接唤起微信
      shareToWechatMobile(url, title);
    } else {
      // PC端：显示二维码弹窗
      showWechatQRCode(url);
    }
  }
  
  // 手机端微信分享
  function shareToWechatMobile(url, title) {
    // 检测是否在微信浏览器内
    var isWechatBrowser = /MicroMessenger/i.test(navigator.userAgent);
    
    if (isWechatBrowser) {
      // 在微信内：提示使用右上角菜单分享
      showWechatInAppGuide();
    } else {
      // 在其他浏览器：显示复制链接引导
      showWechatShareGuide(url);
    }
  }
  
  // 在微信浏览器内的引导
  function showWechatInAppGuide() {
    // 创建或获取弹窗
    var modal = document.querySelector('.wechat-inapp-guide-modal');
    if (!modal) {
      modal = document.createElement('div');
      modal.className = 'wechat-modal wechat-inapp-guide-modal';
      modal.innerHTML = `
        <div class="wechat-modal-content">
          <div class="wechat-modal-title">分享到微信</div>
          <div style="margin: 20px 0; text-align: center;">
            <div style="font-size: 48px; color: #a8b5a0; margin-bottom: 15px;">
              <i class="fas fa-hand-point-up"></i>
            </div>
            <div style="font-size: 14px; color: #666; line-height: 1.6;">
              点击右上角 <span style="font-weight: 600; color: #333;">···</span> 菜单<br>
              选择「发送给朋友」或「分享到朋友圈」
            </div>
          </div>
          <button class="wechat-modal-close" onclick="closeWechatInAppGuide()">我知道了</button>
        </div>
      `;
      document.body.appendChild(modal);
    }
    
    // 显示弹窗
    modal.classList.add('active');
  }
  
  function closeWechatInAppGuide() {
    var modal = document.querySelector('.wechat-inapp-guide-modal');
    if (modal) {
      modal.classList.remove('active');
    }
  }
  
  // 显示微信分享引导弹窗
  function showWechatShareGuide(url) {
    // 创建或获取弹窗
    var modal = document.querySelector('.wechat-share-guide-modal');
    if (!modal) {
      modal = document.createElement('div');
      modal.className = 'wechat-modal wechat-share-guide-modal';
      modal.innerHTML = `
        <div class="wechat-modal-content">
          <div class="wechat-modal-title">分享到微信</div>
          <div class="wechat-modal-desc" style="margin-bottom: 20px;">
            <div style="text-align: left; margin: 15px 0; line-height: 1.8;">
              <div style="display: flex; align-items: center; margin-bottom: 10px;">
                <span style="background: #a8b5a0; color: white; width: 24px; height: 24px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; margin-right: 10px; font-size: 14px;">1</span>
                <span>点击"复制链接"按钮</span>
              </div>
              <div style="display: flex; align-items: center; margin-bottom: 10px;">
                <span style="background: #a8b5a0; color: white; width: 24px; height: 24px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; margin-right: 10px; font-size: 14px;">2</span>
                <span>打开微信，进入聊天或朋友圈</span>
              </div>
              <div style="display: flex; align-items: center;">
                <span style="background: #a8b5a0; color: white; width: 24px; height: 24px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; margin-right: 10px; font-size: 14px;">3</span>
                <span>粘贴链接并发送</span>
              </div>
            </div>
          </div>
          <div id="share-guide-link" style="background: #f5f5f5; padding: 12px; border-radius: 8px; margin-bottom: 20px; word-break: break-all; font-size: 12px; color: #666; max-height: 60px; overflow-y: auto;"></div>
          <button class="share-btn share-wechat" onclick="copyLinkAndClose()" style="width: 100%; margin-bottom: 12px;">
            <i class="fas fa-copy"></i>
            <span>复制链接</span>
          </button>
          <button class="wechat-modal-close" onclick="closeWechatShareGuide()">取消</button>
        </div>
      `;
      document.body.appendChild(modal);
    }
    
    // 更新链接文本
    var linkDiv = document.getElementById('share-guide-link');
    if (linkDiv) {
      linkDiv.textContent = url;
    }
    
    // 显示弹窗
    modal.classList.add('active');
  }
  
  function closeWechatShareGuide() {
    var modal = document.querySelector('.wechat-share-guide-modal');
    if (modal) {
      modal.classList.remove('active');
    }
  }
  
  function copyLinkAndClose() {
    copyLink();
    closeWechatShareGuide();
  }
  
  // PC端显示二维码
  function showWechatQRCode(url) {
    // 创建或获取弹窗
    var modal = document.querySelector('.wechat-modal');
    if (!modal) {
      modal = document.createElement('div');
      modal.className = 'wechat-modal';
      modal.innerHTML = `
        <div class="wechat-modal-content">
          <div class="wechat-modal-title">分享到微信</div>
          <div class="wechat-modal-desc">使用微信扫一扫，分享至朋友圈</div>
          <div class="wechat-qrcode" id="wechat-qrcode"></div>
          <div class="wechat-modal-desc" style="font-size: 12px; color: #999; margin-top: 10px;">如二维码无法显示，请点击"复制链接"手动分享</div>
          <button class="wechat-modal-close" onclick="closeWechatModal()">关闭</button>
        </div>
      `;
      document.body.appendChild(modal);
    }
    
    // 显示弹窗
    modal.classList.add('active');
    
    // 生成二维码
    generateQRCode(url);
  }
  
  function closeWechatModal() {
    var modal = document.querySelector('.wechat-modal');
    if (modal) {
      modal.classList.remove('active');
    }
  }
  
  // 生成二维码（使用可靠的后备服务）
  function generateQRCode(url) {
    var qrcodeContainer = document.getElementById('wechat-qrcode');
    if (!qrcodeContainer) return;
    
    // 清空容器
    qrcodeContainer.innerHTML = '';
    
    // 使用多个后备服务
    var qrServices = [
      // 服务1: QR Server (免费，稳定)
      'https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=10&data=' + encodeURIComponent(url),
      // 服务2: GoQR (免费)
      'https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=10&data=' + encodeURIComponent(url),
      // 服务3: 使用纯CSS和Canvas生成（备用方案）
      null
    ];
    
    var img = document.createElement('img');
    img.alt = '微信分享二维码';
    img.style.maxWidth = '100%';
    img.style.height = 'auto';
    
    // 尝试加载第一个服务
    img.src = qrServices[0];
    
    // 如果加载失败，尝试后备服务
    img.onerror = function() {
      console.log('二维码服务1加载失败，尝试后备方案');
      // 尝试使用 canvas 生成简单二维码
      generateCanvasQRCode(qrcodeContainer, url);
    };
    
    qrcodeContainer.appendChild(img);
  }
  
  // 使用Canvas生成简单二维码（后备方案）
  function generateCanvasQRCode(container, text) {
    container.innerHTML = '';
    
    // 创建一个链接文本作为后备
    var fallbackDiv = document.createElement('div');
    fallbackDiv.style.cssText = 'padding: 20px; background: #f5f5f5; border-radius: 8px; margin: 10px 0;';
    fallbackDiv.innerHTML = `
      <div style="font-size: 14px; color: #666; margin-bottom: 10px;">请复制以下链接分享到微信：</div>
      <div style="font-size: 12px; color: #333; word-break: break-all; background: #fff; padding: 10px; border-radius: 4px; border: 1px solid #ddd;">${text}</div>
      <button onclick="copyLink()" style="margin-top: 10px; padding: 8px 16px; background: #a8b5a0; color: white; border: none; border-radius: 4px; cursor: pointer;">复制链接</button>
    `;
    container.appendChild(fallbackDiv);
  }
  
  // 点击弹窗外部关闭
  document.addEventListener('click', function(e) {
    var modal = document.querySelector('.wechat-modal');
    var guideModal = document.querySelector('.wechat-share-guide-modal');
    var inAppModal = document.querySelector('.wechat-inapp-guide-modal');
    if (modal && e.target === modal) {
      closeWechatModal();
    }
    if (guideModal && e.target === guideModal) {
      closeWechatShareGuide();
    }
    if (inAppModal && e.target === inAppModal) {
      closeWechatInAppGuide();
    }
  });
  
  // ESC键关闭弹窗
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      closeWechatModal();
      closeWechatShareGuide();
      closeWechatInAppGuide();
    }
  });
</script>

</body>
</html>
